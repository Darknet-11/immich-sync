name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  changelog:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: extract
        run: |
          # Strip leading 'v' from tag to match changelog headings
          version="${GITHUB_REF_NAME#v}"

          # Extract the section for this version (everything between this heading and the next ## heading)
          notes=$(awk -v ver="$version" '
            /^## / { if (found) exit; if (index($0, ver)) found=1; next }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md entry found for version $version"
            exit 1
          fi

          # Write to output using multiline syntax
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: [checks, changelog]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 - multiple glibc versions for different Ubuntu LTS
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sync-service
            suffix: "-glibc-2.35"
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: sync-service
            suffix: "-glibc-2.39"
          # Linux aarch64 - multiple glibc versions for different Ubuntu LTS
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: sync-service
            suffix: "-glibc-2.35"
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            artifact: sync-service
            suffix: "-glibc-2.39"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: sync-service
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sync-service
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sync-service.exe
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          tar czf sync-service-${{ matrix.target }}${{ matrix.suffix }}.tar.gz ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath dist/sync-service-${{ matrix.target }}.zip

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sync-service-${{ matrix.target }}${{ matrix.suffix }}
          path: dist/sync-service-${{ matrix.target }}${{ matrix.suffix }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sync-service-${{ matrix.target }}
          path: dist/sync-service-${{ matrix.target }}.zip

  publish:
    needs: [release, changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG_NOTES: ${{ needs.changelog.outputs.notes }}
        run: |
          notes="$CHANGELOG_NOTES

          > **Note:** Only the Linux build is well tested. If you try one of the other builds and run into issues, please [open an issue](https://github.com/${{ github.repository }}/issues). If everything works, we'd love to hear that too!"

          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --notes "$notes" \
            artifacts/**/*.tar.gz \
            artifacts/**/*.zip
